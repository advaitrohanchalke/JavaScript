<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication</title>
</head>
<body>
    <h1>Multiplication</h1>
    <script>
        function multiply(l, o) {
            return l * o;
        }
        document.write("The product of 8 and 4 is " + multiply(8, 4));
    </script>
</body>
</html>
