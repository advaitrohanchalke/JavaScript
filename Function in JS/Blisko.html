<script>
    function showAlert() {
        alert("Blisko is India's fastest delivery app, delivering your essentials in just 5 minutes!");
    }
    function LOL() {
        document.getElementById("lol").style.visibility = "hidden";
         document.querySelector('input').style.visibility = "visible";
        
        if (document.querySelector('input').value === "") {
            document.getElementById("lol").style.visibility = "visible";
          document.getElementById("Coffee").style.visibility = "hidden";
        }
        if (document.querySelector('input').value === "Coffee") {
            document.getElementById("Coffee").style.visibility = "visible"; 
        }
        else {
                document.getElementById("Coffee").style.visibility = "hidden";
            }
            var aaa = ["Chai", "Coffee", "Milk", "Bread", "Pav", "Butter", "Hot Chocolate"];
            if (aaa.includes(document.querySelector('input').value)) {
                document.getElementById("Coffee").style.visibility = "visible"; 
            }
    }
