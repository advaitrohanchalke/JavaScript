<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobbies</title>
</head>
<body align="center">
    <h1>My Hobbies</h1>
    <button id="b1" onclick="showHobbies()">Show My Hobbies</button>
    <script>
        function showHobbies() {
            let hobbies = document.createElement('p');
            hobbies.style.fontSize = "20px";
            hobbies.innerHTML = "I like to play video games, doing studies, and watching movies!";
            document.body.append(hobbies);
        }
    </script>
</body>
</html>
